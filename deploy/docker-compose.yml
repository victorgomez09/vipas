services:
  postgres:
    image: postgres:18-alpine
    container_name: vipas-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: vipas
      POSTGRES_USER: vipas
      POSTGRES_PASSWORD: vipas
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vipas"]
      interval: 5s
      timeout: 3s
      retries: 5

