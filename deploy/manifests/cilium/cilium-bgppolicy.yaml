# Cilium BGP peering policy example
# Fill BGP_PEER_ADDRESS and ASN values according to your network
apiVersion: cilium.io/v2
kind: CiliumBGPPeeringPolicy
metadata:
  name: vipas-bgppolicy
  namespace: kube-system
spec:
  peers:
    - peerAddress: 203.0.113.1      # <-- replace with router peer IP
      peerASN: 65001                # <-- replace with peer ASN
      sourceAddress: 198.51.100.10  # <-- optional: source address to use from node
      nodeSelector: {}              # match gateway nodes (label selector)
  addressFamilies:
    - ipv4
    - ipv6
