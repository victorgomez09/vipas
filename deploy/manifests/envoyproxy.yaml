apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: vipas-proxy
  namespace: gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      # hostNetwork: true → pod shares the node's network namespace.
      # Envoy listens on 0.0.0.0:10080 and 0.0.0.0:10443 on the host (mapped
      # from Gateway listener ports 80/443 via the Cilium/LB Service).
      # A socat bridge service runs on the host on port 80→10080 and 443→10443
      # so WSL2 auto-forwarding detects port 80 as active and routes
      # Windows localhost:80 → socat → Envoy:10080 → HTTPRoute → app.
      # strategy Recreate avoids host-port scheduling conflicts on single-node.
      envoyDeployment:
        patch:
          type: StrategicMerge
          value:
            spec:
              strategy:
                type: Recreate
              template:
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
