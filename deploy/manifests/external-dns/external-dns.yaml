apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: kube-system
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      # Añadimos el ServiceAccount para que use los permisos del punto 2
      serviceAccountName: external-dns 
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.14.0
        args:
        - --source=gateway-httproute
        - --provider=cloudflare
        - --cloudflare-proxied
        - --domain-filter=esmosolutions.es
        # Esto le dice dónde buscar el Gateway que tiene la IP pública
        - --gateway-namespace=envoy-gateway-system 
        env:
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-api-key
              key: apiKey