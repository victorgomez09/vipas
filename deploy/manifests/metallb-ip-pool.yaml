apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vipas-pool
  namespace: metallb-system
spec:
  # Set this to a single CIDR, a CIDR range, or an explicit range like
  # 192.168.1.240-192.168.1.250
  # The installer will substitute METALLB_IP_POOL from the env file.
  addresses:
    - "${METALLB_IP_POOL}"

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vipas-l2
  namespace: metallb-system
spec: {}
