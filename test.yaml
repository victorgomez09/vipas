apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vipas-ping-route
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: vipas-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: service-inexistente 
          port: 80